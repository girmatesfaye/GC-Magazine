<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-hidden flex flex-col">
<!-- Top Navigation Anchor -->
<header class="flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 bg-[#131313]/60 backdrop-blur-xl">
<div class="flex items-center gap-4">
<button class="text-[#ffd700] hover:opacity-80 transition-opacity active:scale-95 duration-300 ease-out">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="text-[#ffd700] font-['Plus_Jakarta_Sans'] font-black tracking-tighter italic">The Keepsake</span>
</div>
<button class="text-[#ffd700] font-['Plus_Jakarta_Sans'] font-bold tracking-tight hover:opacity-80 transition-opacity active:scale-95 duration-300 ease-out">
            Skip
        </button>
</header>
<main class="relative flex-grow flex flex-col pt-16">
<!-- Hero Background Canvas -->
<div class="absolute inset-0 z-0">
<div class="relative w-full h-[618px] editorial-mask">
<img alt="Graduation background" class="w-full h-full object-cover grayscale opacity-40" data-alt="Cinematic close-up of a black graduation cap with gold tassel resting on an old wooden bookshelf, moody low key lighting, soft bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtBd5tr_AZUwTzv3lpIDa5GOxBzCqG6uapCnFhSjqR3ONT7xWjlv5QNXnMDQBC5Fp2VWKLDcGNSlhM97Ob7TcoplYL4Szg0gqiEOtO2bJ8xWj6EdN48KKFN7kXsQM8tZCZLGnfPH78epXi5UYmEKN_Sw01I90wJR94eH8y9dA_XSCYNVCoWLbgshIwtZdx4kz0-BixKfNwWh1-xQQSdJ5F4nT-zDKvNnV6I91CI4alMnBcn5tWYUa_lP6oWpcHnDVLspaMTZucvv-T"/>
<div class="absolute inset-0 bg-gradient-to-b from-surface/0 via-surface/40 to-surface"></div>
</div>
</div>
<!-- Content Shell -->
<div class="relative z-10 flex-grow flex flex-col justify-end px-8 pb-24 md:pb-32 max-w-2xl mx-auto w-full">
<!-- Achievement Halo / Progress Indicator -->
<div class="mb-12 flex justify-center">
<div class="relative w-20 h-20 flex items-center justify-center">
<svg class="absolute inset-0 transform -rotate-90 w-full h-full">
<circle class="text-outline-variant opacity-20" cx="40" cy="40" fill="transparent" r="38" stroke="currentColor" stroke-width="1"></circle>
<circle class="text-secondary" cx="40" cy="40" fill="transparent" r="38" stroke="currentColor" stroke-dasharray="238.76" stroke-dashoffset="0" stroke-width="2"></circle>
</svg>
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome_motion</span>
</div>
</div>
<!-- Typography Stack -->
<div class="space-y-6 text-center md:text-left">
<div class="space-y-2">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/60 block">Archive Forever</span>
<h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tight leading-tight text-gradient-gold">
                        A Digital Time Capsule
                    </h1>
</div>
<p class="font-body text-lg md:text-xl text-on-surface-variant leading-relaxed font-light max-w-lg mx-auto md:mx-0">
                    Your graduation isn't just a day, it's a milestone. Archive it forever in your personal vault.
                </p>
</div>
<!-- Action Zone -->
<div class="mt-12 flex flex-col md:flex-row items-center gap-6">
<button class="w-full md:w-auto px-10 py-5 bg-gradient-gold text-on-primary-container font-headline font-bold rounded-full shadow-[0_12px_40px_rgba(0,0,0,0.4)] active:scale-95 transition-all duration-300 hover:opacity-90">
                    Get Started
                </button>
<div class="flex gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
<div class="w-6 h-1.5 rounded-full bg-primary-container"></div>
</div>
</div>
