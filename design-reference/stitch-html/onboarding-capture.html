<body class="bg-surface text-on-surface font-body min-h-screen overflow-hidden">

</div>
<button class="text-[#ffd700] font-['Plus_Jakarta_Sans'] font-bold tracking-tight hover:opacity-80 transition-opacity active:scale-95 duration-300 ease-out">Skip</button>
</header>
<main class="relative h-screen w-full flex flex-col justify-end">
<!-- Large Emotional Background Image -->
<div class="absolute inset-0 z-0">
<img alt="emotional background image" class="w-full h-full object-cover" data-alt="Candid high-angle shot of a joyful graduate in a black gown holding a smartphone high to record a video, surrounded by cheering classmates and floating golden confetti under warm sunlight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXVe9CvDSrooV4Bop4Kz2JsCYNFEOGIh1g-Pw4HNLuHwY47n2z5ocQ8GbE3UQ1c2BVdb6pwt_Cx5TvSJnWBTi0545cYplyy43mqRHDU4_VPbqzpAOVBVGhIuMDIrPZhkYOeoaBHnLGuZ9hhJMxu7VWj5LPMrn-A2evVrNH767HKpvPA2eYTwdfT3Ju1BG3kDcYoA_jaKMEMiqf9sBz2nsrlu46frUsH6VFbkkMa3O0sSuOtSZYITSLgoRgBA0A31fz5wJDwBkehLJx"/>

</div>
<!-- Content Canvas -->
<div class="relative z-10 px-8 pb-20 md:pb-24 max-w-4xl w-full mx-auto">
<!-- Editorial Typography Cluster -->
<div class="space-y-6">
<div class="space-y-2">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary-fixed-dim">Step 02 — Memory Hub</span>
<h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tighter text-primary leading-[0.9] text-shadow-editorial">
            Capture Every <span class="italic text-primary-container">Emotion</span>
</h1>
</div>
<p class="font-body text-lg md:text-xl text-on-surface-variant max-w-xl leading-relaxed">
          Save the cheers, the tears, and the laughs with high-fidelity photo and voice memories. Every second of your legacy, preserved in gold.
        </p>
<!-- Feature Bento-lite Display -->
<div class="flex gap-4 pt-4">
<div class="glass-effect rounded-lg p-4 flex items-center gap-4 flex-1">
<div class="bg-primary-container/20 p-2 rounded-full">
<span class="material-symbols-outlined text-primary-container" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Voice</span>
<span class="font-headline font-bold text-sm text-primary">Spatial Audio</span>
</div>
</div>
<div class="glass-effect rounded-lg p-4 flex items-center gap-4 flex-1">
<div class="bg-primary-container/20 p-2 rounded-full">

</div>
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Visual</span>
<span class="font-headline font-bold text-sm text-primary">Raw Clarity</span>
</div>
</div>
</div>
