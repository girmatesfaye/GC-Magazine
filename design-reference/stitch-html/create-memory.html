</div>
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/20 hover:opacity-80 transition-opacity active:scale-95 duration-300 ease-out">

<p class="text-on-surface-variant font-body text-lg">Every frame tells a story of your journey.</p>
</div>

<div class="aspect-[16/10] w-full rounded-lg bg-surface-container-low overflow-hidden flex items-center justify-center relative">
<img class="absolute inset-0 w-full h-auto object-cover opacity-40 grayscale group-hover:scale-105 group-hover:opacity-60 transition-all duration-700" data-alt="cinematic shot of an empty graduation stage with soft warm spotlights and dust motes dancing in the air" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3SI7ZozL6Ty8bYxPxcPEgufRNu54weHaJWR1Nksas5LNYUcjp3LtkCAnWPHo96TibgdFMcfhCUwHQvX1w4TfD3D7JNf69Xqmu3fSCIshRpJjqhvdWreph__lu9QAOmV7cNpRyq-M8XdXAsxpJECXEK7VGzJeKWiJVYHwtn06L3Pc9ePDA6d1_mmkPe6RqOKPWj8ezSf6-OmCqll4-Zt2GNwj8iYCUWFK_TzG26MMnb-LIHfucTtzgwNHEMZpjqoBNGsSeo8mqcHWm"/>

</div>
<span class="font-label text-sm tracking-[0.1em] text-primary uppercase">Upload Visual Memory</span>
</div>
</div>

<div class="flex items-start gap-4">
<div class="flex-1">
<label class="block font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-4" for="memory_text">The Narrative</label>
<textarea class="w-full bg-transparent border-none focus:ring-0 text-xl font-headline placeholder:text-surface-container-highest resize-none" id="memory_text" placeholder="How do you feel?" rows="4"></textarea>
</div>
<button class="w-14 h-14 rounded-full premium-gradient flex items-center justify-center shadow-lg active:scale-90 transition-transform duration-300"><span class="material-symbols-outlined text-on-primary-fixed text-2xl" style="font-variation-settings: 'FILL' 1, 'wght' 400;">keyboard_voice</span></button>
</div>
</div>
<!-- Settings Grid -->
<div class="space-y-6">
<!-- Privacy Toggle -->
<!-- Location Tagging (Contextual) -->
<div class="glass-panel p-6 rounded-lg border border-outline-variant/10 flex items-center justify-between group cursor-pointer">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant">location_on</span>
<div>
<p class="font-headline font-semibold text-on-surface">Campus Tag</p>
<p class="font-label text-xs text-on-surface-variant uppercase tracking-wider">Main University Plaza</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
</div>

</div><div class="glass-panel p-6 rounded-lg border border-outline-variant/10 mb-8 flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant">sell</span>
<div class="flex-1">
<label class="block font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-1" for="tags_input">Memory Tags</label>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-surface-container-highest" id="tags_input" placeholder="Add tags (e.g., #graduation #memories)" type="text"/>
</div>

            </button>
</div>
